<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>siam3310 - cdn-live.tv</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- HLS.js for streaming -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            background-color: #1a1a1a;
        }
        #player-container {
            position: sticky;
            top: 1rem;
            background-color: #000;
        }
        #videoPlayer {
            width: 100%;
            height: auto;
            background-color: #000;
        }
        #channel-list-container {
            height: 90vh;
            overflow-y: auto;
        }
        .list-group-item {
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .list-group-item:hover, .list-group-item.active {
            background-color: #007bff;
            border-color: #007bff;
        }
        .channel-logo {
            width: 30px;
            height: 30px;
            margin-right: 15px;
            object-fit: contain;
            background-color: #fff;
            border-radius: 4px;
        }
        .playing-text {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Video Player Column -->
            <div class="col-lg-8">
                <div id="player-container" class="border rounded">
                    <video id="videoPlayer" controls autoplay poster="https://i.imgur.com/gC5sJd7.png"></video>
                </div>
                 <h3 id="status" class="mt-3">Welcome! Select a channel to start watching.</h3>
            </div>

            <!-- Channel List Column -->
            <div class="col-lg-4">
                <div class="mb-3">
                    <input type="text" id="search-input" class="form-control" placeholder="Search for a channel...">
                </div>
                <div id="channel-list-container" class="border rounded">
                    <div id="channel-list" class="list-group">
                        <!-- Channels will be loaded here dynamically -->
                        <div class="p-5 text-center" id="loader">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">Loading Channels...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const video = document.getElementById('videoPlayer');
        const statusElement = document.getElementById('status');
        const channelListElement = document.getElementById('channel-list');
        const searchInput = document.getElementById('search-input');
        const loader = document.getElementById('loader');
        
        const M3U_URL = 'https://raw.githubusercontent.com/siam3310/cdn-tv/refs/heads/main/siamcdnplaylist.m3u';
        let hls;
        let channels = [];

        // --- 1. Play a selected channel ---
        function playChannel(channelName) {
            // The API endpoint is on the same host, under /api/proxy
            const streamUrl = `/api/proxy?channel=${encodeURIComponent(channelName)}`;
            statusElement.innerHTML = `Loading: <span class="playing-text">${channelName}</span>`;

            console.log(`Attempting to play: ${streamUrl}`);

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls({
                    // Add a timeout for fragment loading
                     fragLoadingMaxRetry: 4,
                     fragLoadingMaxRetryTimeout: 20000,
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play();
                    statusElement.innerHTML = `Now Playing: <span class="playing-text">${channelName}</span>`;
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        console.error('Fatal HLS error:', data);
                        statusElement.textContent = `Error loading stream: ${data.details}.`;
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    statusElement.innerHTML = `Now Playing: <span class="playing-text">${channelName}</span>`;
                });
            }

            // Update active state in the channel list
            document.querySelectorAll('.list-group-item').forEach(item => {
                if (item.dataset.channelName === channelName) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        // --- 2. Fetch and Display Channels ---
        async function loadChannels() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const m3uText = await response.text();

                const lines = m3uText.split(/\r\n|\n|\r/);
                
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        const infoLine = lines[i];
                        const nameMatch = infoLine.split(',').pop();
                        const logoMatch = infoLine.match(/tvg-logo="([^"]+)"/);
                        const groupMatch = infoLine.match(/group-title="([^"]+)"/);

                        const channelName = nameMatch.trim();
                        const channelLogo = logoMatch ? logoMatch[1] : 'https://i.imgur.com/Nl4aZCF.png'; // Default logo
                        const channelGroup = groupMatch ? groupMatch[1] : 'General';
                        
                        if (channelName) {
                            channels.push({ name: channelName, logo: channelLogo, group: channelGroup });
                        }
                    }
                }
                renderChannels(channels);
                loader.style.display = 'none';

            } catch (error) {
                console.error('Failed to load M3U playlist:', error);
                loader.innerHTML = '<p class="text-danger">Failed to load channels.</p>';
            }
        }
        
        // --- 3. Render Channels to the list ---
        function renderChannels(channelsToRender) {
             channelListElement.innerHTML = ''; // Clear existing list
             if (channelsToRender.length === 0) {
                 channelListElement.innerHTML = '<p class="text-center p-3">No channels found.</p>';
                 return;
             }
             channelsToRender.forEach(channel => {
                const item = document.createElement('a');
                item.className = 'list-group-item list-group-item-action d-flex align-items-center';
                item.dataset.channelName = channel.name;
                item.href = '#'; // for bootstrap styling
                item.innerHTML = `
                    <img src="${channel.logo}" class="channel-logo" alt="${channel.name} logo">
                    <span>${channel.name}</span>
                `;
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    playChannel(channel.name);
                });
                channelListElement.appendChild(item);
            });
        }
        
        // --- 4. Search/Filter Functionality ---
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            const filteredChannels = channels.filter(channel => 
                channel.name.toLowerCase().includes(searchTerm)
            );
            renderChannels(filteredChannels);
        });

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', loadChannels);

    </script>
</body>
</html>
