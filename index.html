<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Channels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root {
            --bs-body-bg: #121212;
            --bs-border-color: rgba(255, 255, 255, 0.1);
        }
        #player-column {
            position: sticky;
            top: 1rem;
            align-self: flex-start;
        }
        #video-container {
            background-color: #000;
            aspect-ratio: 16 / 9;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
            background-color: #000;
        }
        #channel-list-container {
            height: 90vh;
            overflow-y: auto;
        }
        .channel-logo {
            width: 32px;
            height: 32px;
            margin-right: 1rem;
            object-fit: contain;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 4px;
            padding: 2px;
        }
        #status .playing-text {
            color: var(--bs-primary);
            font-weight: 500;
        }
        .list-group-item.active {
             background-color: var(--bs-primary);
             border-color: var(--bs-primary);
        }
        .list-group-item-action:hover {
            background-color: rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- Video Player Column -->
            <div class="col-lg-8" id="player-column">
                <div id="video-container" class="border rounded overflow-hidden">
                    <video id="videoPlayer" controls autoplay poster="https://i.imgur.com/gC5sJd7.png"></video>
                </div>
                <h3 id="status" class="mt-3">Welcome! Select a channel to start.</h3>
                <p class="text-body-secondary small">Click twice if channel not play ! | Made by - Siam3310</p>
            </div>

            <!-- Channel List Column -->
            <div class="col-lg-4">
                <div class="mb-3">
                    <input type="text" id="search-input" class="form-control" placeholder="Search for a channel...">
                </div>
                <div id="channel-list-container" class="border rounded">
                    <div id="channel-list" class="list-group list-group-flush">
                        <!-- Channels will be loaded here dynamically -->
                        <div class="p-5 text-center" id="loader">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <p class="mt-2">Loading Channels...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const statusElement = document.getElementById('status');
        const channelListElement = document.getElementById('channel-list');
        const searchInput = document.getElementById('search-input');
        const loader = document.getElementById('loader');
        const channelListContainer = document.getElementById('channel-list-container');

        const M3U_URL = 'https://raw.githubusercontent.com/siam3310/cdn-tv/refs/heads/main/siamcdnplaylist.m3u';
        let hls;
        let allChannels = [];
        let currentlyDisplayedChannels = [];
        const CHANNELS_PER_PAGE = 50;
        let currentPage = 1;
        let activeChannelName = null;

        // --- 1. Play a selected channel (Robust Version) ---
        function playChannel(channelName) {
            const streamUrl = `/api/proxy?channel=${encodeURIComponent(channelName)}`;
            statusElement.innerHTML = `Loading: <span class="playing-text">${channelName}</span>`;
            activeChannelName = channelName;

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                }
                hls = new Hls({
                     fragLoadingMaxRetry: 4,
                     fragLoadingMaxRetryTimeout: 20000,
                });
                hls.loadSource(streamUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => console.error("Play被浏览器阻止:", e));
                    statusElement.innerHTML = `Now Playing: <span class="playing-text">${channelName}</span>`;
                });
                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusElement.textContent = `Error: ${data.details}. Try another channel.`;
                    }
                });
                // Force play after a short delay to overcome browser hesitation
                setTimeout(() => video.play().catch(e => {}), 500);

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = streamUrl;
                video.play().catch(e => console.error("Play was blocked by browser:", e));
            }
            updateActiveChannel();
        }

        // --- 2. Fetch and Parse ALL Channels ---
        async function fetchAndParseM3U() {
            try {
                const response = await fetch(M3U_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const m3uText = await response.text();
                const lines = m3uText.split(/\r\n|\n|\r/);
                
                let channels = [];
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        const infoLine = lines[i];
                        const nameMatch = infoLine.split(',').pop();
                        const logoMatch = infoLine.match(/tvg-logo="([^"]+)"/);
                        if (nameMatch) {
                            channels.push({ 
                                name: nameMatch.trim(), 
                                logo: logoMatch ? logoMatch[1] : 'https://i.imgur.com/Nl4aZCF.png'
                            });
                        }
                    }
                }
                allChannels = channels;
                loader.style.display = 'none';
                renderInitialChannels();

            } catch (error) {
                console.error('Failed to load M3U playlist:', error);
                loader.innerHTML = '<div class="p-3 text-danger">Failed to load channels.</div>';
            }
        }
        
        // --- 3. Render Channels to the DOM ---
        function renderChannels(channelsToRender) {
             channelsToRender.forEach(channel => {
                const item = document.createElement('a');
                item.className = 'list-group-item list-group-item-action d-flex align-items-center';
                item.dataset.channelName = channel.name;
                item.href = '#';
                item.innerHTML = `
                    <img src="${channel.logo}" class="channel-logo" alt="${channel.name} logo" onerror="this.src='https://i.imgur.com/Nl4aZCF.png';">
                    <span class="flex-grow-1">${channel.name}</span>
                `;
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    playChannel(channel.name);
                });
                channelListElement.appendChild(item);
            });
            updateActiveChannel();
        }

        function renderInitialChannels() {
            channelListElement.innerHTML = '';
            currentPage = 1;
            const channelsToRender = allChannels.slice(0, CHANNELS_PER_PAGE);
            currentlyDisplayedChannels = channelsToRender;
            renderChannels(channelsToRender);
        }

        function appendMoreChannels() {
            if (searchInput.value) return; // Don't append if searching
            const startIndex = currentPage * CHANNELS_PER_PAGE;
            const endIndex = startIndex + CHANNELS_PER_PAGE;
            if (startIndex >= allChannels.length) return; // No more channels
            
            const newChannels = allChannels.slice(startIndex, endIndex);
            currentlyDisplayedChannels.push(...newChannels);
            renderChannels(newChannels); // only render new ones
            currentPage++;
        }

        function updateActiveChannel() {
             document.querySelectorAll('.list-group-item').forEach(item => {
                item.classList.toggle('active', item.dataset.channelName === activeChannelName);
            });
        }
        
        // --- 4. Search and Infinite Scroll Listeners ---
        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            channelListContainer.scrollTop = 0; // Scroll to top

            if (!searchTerm) {
                renderInitialChannels();
                return;
            }
            const filteredChannels = allChannels.filter(channel => 
                channel.name.toLowerCase().includes(searchTerm)
            );
            channelListElement.innerHTML = ''; // Clear list before rendering search results
            renderChannels(filteredChannels);
        });

        channelListContainer.addEventListener('scroll', () => {
            // If user is searching, don't infinitely scroll
            if (searchInput.value) return;

            const { scrollTop, scrollHeight, clientHeight } = channelListContainer;
            if (scrollTop + clientHeight >= scrollHeight - 300) { // load 300px before end
                appendMoreChannels();
            }
        });

        // --- Initial Load ---
        document.addEventListener('DOMContentLoaded', fetchAndParseM3U);

    </script>
</body>
</html>
