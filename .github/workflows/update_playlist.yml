name: Update M3U Playlist

on:
  schedule:
    - cron: '*/40 * * * *'  # প্রতি 40 মিনিটে রান করার কমান্ড
  workflow_dispatch:      # ম্যানুয়ালি রান করার অপশন

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10   # সময় একটু বাড়িয়ে দেওয়া হয়েছে

    permissions:
      contents: write     # ফাইল পুশ করার জন্য পারমিশন

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # পুরো হিস্ট্রি নেওয়ার জন্য

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run script with enhanced logging
        run: |
          python create_playlist.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto update playlist: ${{ github.run_id }}"
          file_pattern: 'siamcdnplaylist.m3u' # আপনার ফাইলের নাম নিশ্চিত করুন
          skip_dirty_check: false    # যদি ফাইলে কোনো পরিবর্তন না আসে তবে পুশ হবে না
          commit_author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
